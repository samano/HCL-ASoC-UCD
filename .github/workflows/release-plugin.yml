name: Release plugin ZIP

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string
      title:
        description: 'Optional release title'
        required: false
        type: string

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '8'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: 6.9.4

      - name: Build plugin distributable
        run: gradle clean distPlugin

      - name: Find plugin ZIP
        id: plugin_zip
        shell: bash
        run: |
          shopt -s nullglob
          zip_files=(build/distributions/*.zip)

          if [ "${#zip_files[@]}" -ne 1 ]; then
            echo "Expected exactly one ZIP in build/distributions, found ${#zip_files[@]}."
            exit 1
          fi

          echo "path=${zip_files[0]}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release and upload ZIP
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          TITLE: ${{ inputs.title }}
          ZIP_PATH: ${{ steps.plugin_zip.outputs.path }}
        shell: bash
        run: |
          if [ -n "$TITLE" ]; then
            gh release create "$TAG" "$ZIP_PATH" --target "$GITHUB_SHA" --title "$TITLE" --generate-notes
          else
            gh release create "$TAG" "$ZIP_PATH" --target "$GITHUB_SHA" --generate-notes
          fi
